<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tower Defence — Browser Demo</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #1a1a2e;
        color: #eee;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1rem;
        gap: 1rem;
      }
      h1 {
        font-size: 1.4rem;
      }
      #layout {
        display: flex;
        gap: 1rem;
        align-items: flex-start;
      }
      #gameplay {
        display: block;
        border: 2px solid #444;
        background: #f5f0e8;
      }
      #hud {
        min-width: 200px;
        background: #16213e;
        border: 1px solid #2a3a52;
        border-radius: 4px;
        padding: 0.85rem 1rem;
        font-size: 0.9rem;
      }
      .hud-stat {
        margin-bottom: 0.7rem;
      }
      .hud-stat:last-of-type {
        margin-bottom: 0;
      }
      .hud-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #7a8aa8;
        margin-bottom: 0.15rem;
      }
      .hud-value {
        font-size: 1.05rem;
        font-weight: 600;
        color: #f0f4ff;
        font-variant-numeric: tabular-nums;
      }
      .hud-base-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .hud-base-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        margin-bottom: 0.2rem;
      }
      .hud-base-name {
        color: #c8d0e0;
      }
      .hud-base-hp {
        color: #f0f4ff;
        font-variant-numeric: tabular-nums;
      }
      .hud-base-bar {
        height: 6px;
        background: #0e1a2c;
        border: 1px solid #2a3a52;
        border-radius: 3px;
        overflow: hidden;
      }
      .hud-base-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #2ecc71, #27ae60);
        transition: width 0.2s ease;
      }
      .hud-banner {
        font-size: 1.2rem;
        font-weight: bold;
        margin-top: 0.85rem;
        padding-top: 0.7rem;
        border-top: 1px solid #2a3a52;
      }
      #error {
        display: none;
        color: #e74c3c;
        background: #2d1b1b;
        padding: 1rem;
        border-radius: 4px;
        white-space: pre-wrap;
        max-width: 600px;
      }
    </style>
  </head>
  <body>
    <h1>Tower Defence — Browser Reference Demo</h1>
    <div id="layout">
      <canvas id="gameplay"></canvas>
      <div id="hud"></div>
    </div>
    <div id="error"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tower Defence — Browser Demo</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #1a1a2e;
        color: #eee;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1rem;
        gap: 1rem;
      }
      h1 { font-size: 1.4rem; }
      #layout {
        display: flex;
        gap: 1rem;
        align-items: flex-start;
      }
      #gameplay {
        display: block;
        border: 2px solid #444;
        background: #f5f0e8;
      }
      #hud {
        min-width: 160px;
        background: #16213e;
        border: 1px solid #444;
        border-radius: 4px;
        padding: 0.75rem;
        font-size: 0.9rem;
        line-height: 1.8;
      }
      #hud-banner {
        font-size: 1.2rem;
        font-weight: bold;
        margin-top: 0.5rem;
      }
      #error {
        display: none;
        color: #e74c3c;
        background: #2d1b1b;
        padding: 1rem;
        border-radius: 4px;
        white-space: pre-wrap;
        max-width: 600px;
      }
    </style>
  </head>
  <body>
    <h1>Tower Defence — Browser Reference Demo</h1>
    <div id="layout">
      <canvas id="gameplay"></canvas>
      <div id="hud"></div>
    </div>
    <div id="error"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
